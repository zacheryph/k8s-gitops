# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hubble-ui
  namespace: kube-system
  # NOTE: intentionally NOT annotated dns.routine.sh/external: "true" so
  # external-dns-cloudflare skips it — Hubble UI has no built-in auth. It
  # resolves internally only (AdGuard) at hubble.${CLUSTER_DOMAIN}. For
  # remote access use: kubectl port-forward -n kube-system svc/hubble-ui 8080:80
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external
      namespace: gateway
  hostnames:
    - "hubble.${CLUSTER_DOMAIN}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: hubble-ui
          port: 80

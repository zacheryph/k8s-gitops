# yaml-language-server: $schema=https://json.schemastore.org/kustomization.json
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: backup

# Generated by kustomize manually — references ConfigMaps in _base and one CronJob per PVC.
# To add another PVC, drop a copy of cronjobs/pvc-immich-photos-pool.yaml under cronjobs/
# and append it to the resources: list below. Same for jobs/ and drill/.
resources:
  - namespace.yaml
  - rbac.yaml
  - _base/kopia-scripts.yaml
  - _base/kopia-policy.yaml
  - cronjobs/pvc-immich-photos-pool.yaml
  - jobs/kopia-init-immich-photos-pool.yaml
  - drill/kopia-restore-drill-immich-photos-pool.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: backup
      app.kubernetes.io/managed-by: kustomize

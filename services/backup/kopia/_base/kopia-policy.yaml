# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/configmap.json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kopia-policy
  namespace: backup
  labels:
    app.kubernetes.io/part-of: backup
    app.kubernetes.io/name: kopia
data:
  # Global retention policy applied by the backup script. Edit here, not in the script.
  # https://kopia.io/docs/policy/
  policy.json: |
    {
      "retention": {
        "keepLatest": 0,
        "keepDaily":  7,
        "keepWeekly": 4,
        "keepMonthly":12,
        "keepAnnual": 0,
        "keepHourly": 0
      },
      "compression": {
        "compressorName": "zstd-fast"
      },
      "encryption": {
        "algorithm": "AES256_GCM"
      },
      "upload": {
        "maxParallelSnapshots": 1,
        "maxParallelFileReads": 8
      },
      "filesystem": {
        "ignoreCacheDirectories": true
      }
    }

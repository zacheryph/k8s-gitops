# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/persistentvolumeclaim.json
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-config
  namespace: media
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 32Gi
  storageClassName: longhorn
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app plex
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    defaultPodOptions:
      securityContext:
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
      nodeSelector:
        intel.feature.node.kubernetes.io/gpu: "true"
    controllers:
      plex:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/plex
              tag: 1.43.2.10687@sha256:be00a2ad851ea3193cd870636f908eb6425ad89390f23cdb08daa35ab5cceacc
            env:
              PLEX_ADVERTISE_URL: https://plex.${CLUSTER_DOMAIN}:443,http://${LOAD_BALANCER_PLEX}:32400
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: 32400
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              # Plex Media Server's working set routinely exceeds 2 Gi
              # for any non-trivial library: idle ~500-800 MiB, library
              # scan 1.5-2.5 GiB transient, 4K transcode 2-3 GiB, plus
              # a small long-running memory creep. With Intel QuickSync
              # HW transcode (gpu.intel.com/i915) the frame buffers
              # count against the cgroup limit, so transcode spikes
              # push usage above what non-HW Plex needs.
              #
              # Observed on the cluster: pod OOMKilled (exit 137)
              # ~1x/hour over 6 days = 138 restarts. Last OOM
              # 2026-06-11 09:54:51 UTC. Bump limit 2 Gi -> 8 Gi and
              # add a 2 Gi request so the scheduler reserves baseline
              # memory (currently missing).
              requests:
                cpu: 100m
                memory: 2Gi
              limits:
                gpu.intel.com/i915: 1
                memory: 8Gi
    persistence:
      config:
        enabled: true
        existingClaim: plex-config
      media:
        enabled: true
        existingClaim: media-pool
      transcode:
        enabled: true
        type: emptyDir
    service:
      app:
        controller: plex
        type: LoadBalancer
        loadBalancerIP: ${LOAD_BALANCER_PLEX}
        externalTrafficPolicy: Local
        ports:
          http:
            port: 32400
    route:
      app:
        enabled: true
        kind: HTTPRoute
        annotations:
          dns.routine.sh/external: "true"
        hostnames: [ "plex.${CLUSTER_DOMAIN}" ]
        parentRefs:
          - name: external
            namespace: gateway

---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/gitrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: hermes-agent
spec:
  interval: 12h
  url: https://github.com/zacheryph/hermes-agent-helm-chart
  ref:
    branch: feat/web-dashboard
    commit: 7193ec5be50375b18e037d4a31613742cc10b0b3
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name hermes-agent
spec:
  interval: 1h
  chart:
    spec:
      chart: ./
      # Repackage on git revision changes; the fork's Chart.yaml version
      # stays 0.1.0, so the default ChartVersion strategy never rebuilds.
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: hermes-agent
  install:
    crds: Skip
  upgrade:
    crds: Skip
  values:
    image:
      repository: nousresearch/hermes-agent
      tag: "v2026.6.5@sha256:9ad3b04ec916ea2c2da22358fd43b024c788d74073210695af88bfc2e63869b4"

    bootstrap:
      overwrite: false

    # LLM via OpenRouter (base_url is the chart default; set explicitly for clarity)
    config:
      values:
        model:
          default: minimax/minimax-m3
          provider: auto
          base_url: https://openrouter.ai/api/v1

    # s6-overlay starts as root then drops to HERMES_UID/GID internally
    podSecurityContext:
      runAsUser: 0
      runAsNonRoot: false
    securityContext:
      allowPrivilegeEscalation: true
      readOnlyRootFilesystem: false
      runAsNonRoot: false
      capabilities:
        drop: []

    # Slack gateway — comma-separated Slack user IDs allowed to DM the agent
    env:
      SLACK_ALLOWED_USERS: ${HERMES_SLACK_ALLOWED_USERS}
      SIGNAL_ALLOWED_USERS: ${HERMES_SIGNAL_ALLOWED_USERS}
      HERMES_UID: "1000"
      HERMES_GID: "1000"
      HERMES_YOLO_MODE: "1"

    # Secrets rendered into a Kubernetes Secret by the chart
    secrets:
      OPENROUTER_API_KEY: ${HERMES_OPENROUTER_API_KEY}
      SLACK_BOT_TOKEN: ${HERMES_SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${HERMES_SLACK_APP_TOKEN}
      API_SERVER_KEY: ${HERMES_API_SERVER_KEY}
      WEBHOOK_SECRET: ${HERMES_WEBHOOK_SECRET}
      #SIGNAL_HTTP_URL: http://signal-cli-rest-api:8080
      #SIGNAL_ACCOUNT: ${HERMES_SIGNAL_ACCOUNT}

    persistence:
      enabled: true
      storageClass: longhorn
      size: 16Gi

    apiServer:
      enabled: true

    # Hermes webhook listener (port 8644) — external services like GitHub,
    # Stripe, CI/CD, etc. POST events here to trigger agent runs. HMAC-secret
    # authenticated per subscription; the global WEBHOOK_SECRET below is the
    # fallback for static routes and acts as a default for dynamic
    # subscriptions. Subscriptions are created at runtime via
    # `hermes webhook subscribe` and persist in HERMES_HOME.
    webhook:
      enabled: true

    # Web dashboard authenticates directly against pocket-id as a public
    # PKCE client (no client secret); the gateway-level OIDC SecurityPolicy
    # is intentionally not applied to this route to avoid a double login.
    dashboard:
      enabled: true
      publicUrl: https://hermes.${CLUSTER_DOMAIN}
      auth:
        oidc:
          issuer: ${OIDC_ISSUER_URL}
          clientId: ${OIDC_HERMES_DASHBOARD_CLIENT_ID}

    service:
      enabled: true

    extraObjects:
      - apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: hermes-agent
        spec:
          parentRefs:
            - name: external
              namespace: gateway
          hostnames:
            - hermes.${CLUSTER_DOMAIN}
          rules:
            - backendRefs:
                - name: hermes-agent
                  port: 9119

      # Separate hostname for the webhook listener so subscription URLs and
      # HMAC signatures aren't mixed with dashboard cookies. Path prefix is
      # kept open (`/`) — hermes-agent inspects the path inside its handler
      # and returns 404 for non-subscription routes.
      - apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: hermes-agent-webhook
        spec:
          parentRefs:
            - name: external
              namespace: gateway
          hostnames:
            - hermes-webhook.${CLUSTER_DOMAIN}
          rules:
            - backendRefs:
                - name: hermes-agent
                  port: 8644

    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi

    # ServiceAccount: use the pre-created `hermes-viewer` SA in this
    # namespace (see core/hermes-viewer/) and mount its token so the
    # in-cluster Python kubernetes client can authenticate automatically.
    # We set `create: false` because the SA is owned by the GitOps repo
    # (Flux-managed), not the chart.
    serviceAccount:
      create: false
      name: hermes-viewer
      automountServiceAccountToken: true

    # --- Obsidian sync sidecar ---
    # Runs obsidian-headless as a sidecar in the Hermes pod to mirror
    # /opt/data/Obsidian <-> Obsidian Sync in real time. Non-secret
    # configuration (vault name) is in cluster-secrets. The auth token
    # is in the `obsidian-auth-token` Secret (created out-of-band via
    # `kubectl create secret generic` — see the PR description for the
    # runbook). The obsidian skill uses OBSIDIAN_VAULT_PATH=/opt/data/Obsidian.
    extraVolumes:
      - name: obsidian-auth
        secret:
          secretName: obsidian-auth-token
          defaultMode: 0o600
      - name: obsidian-config
        emptyDir: {}
    extraInitContainers:
      - name: obsidian-sync-init
        image: node:22-bookworm-slim
        imagePullPolicy: IfNotPresent
        command: [/bin/sh, -ec]
        args:
          - |
            set -eu
            # Install obsidian-headless into a persistent location on the
            # shared data PVC. The install survives pod restarts because
            # /opt/obsidian-headless is a subPath of the data PVC.
            if [ ! -x /opt/obsidian-headless/bin/ob ]; then
              mkdir -p /opt/obsidian-headless
              npm install --prefix /opt/obsidian-headless --global \
                "obsidian-headless@${OBSIDIAN_HEADLESS_VERSION}"
            fi
            # Bind the local vault path to the remote Obsidian vault.
            # `ob sync-setup` is idempotent — re-running with the same args
            # is a no-op, so the || true keeps this resilient.
            /opt/obsidian-headless/bin/ob sync-setup \
              --vault "${HERMES_OBSIDIAN_VAULT_NAME}" \
              --path /opt/data/Obsidian \
              --device-name hermes-server \
              || true
            # Apply sync options. `--conflict-strategy conflict` keeps both
            # copies on collision (safer than `merge` for markdown).
            /opt/obsidian-headless/bin/ob sync-config \
              --path /opt/data/Obsidian \
              --mode bidirectional \
              --conflict-strategy conflict \
              --file-types image,audio,video,pdf,unsupported \
              --configs appearance,hotkey,core-plugin,community-plugin
            echo "obsidian-sync-init: complete"
        env:
          - name: HOME
            value: /var/lib/obsidian
          - name: NPM_CONFIG_PREFIX
            value: /opt/obsidian-headless
          - name: NPM_CONFIG_CACHE
            value: /var/lib/obsidian/.npm
          - name: OBSIDIAN_HEADLESS_VERSION
            value: "0.0.11"
          - name: HERMES_OBSIDIAN_VAULT_NAME
            value: ${HERMES_OBSIDIAN_VAULT_NAME}
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsUser: 0
          runAsNonRoot: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
          - name: data
            mountPath: /opt/data/Obsidian
            subPath: Obsidian
          - name: data
            mountPath: /opt/obsidian-headless
            subPath: obsidian-headless
          - name: obsidian-config
            mountPath: /var/lib/obsidian
          - name: tmp
            mountPath: /tmp
    extraContainers:
      - name: obsidian-sync
        image: node:22-bookworm-slim
        imagePullPolicy: IfNotPresent
        command: [/bin/sh, -ec]
        args:
          - |
            set -eu
            # Re-install obsidian-headless if /opt/obsidian-headless is
            # missing (e.g. first start, or PVC was wiped). The install
            # lives on the data PVC so this is normally a no-op.
            if [ ! -x /opt/obsidian-headless/bin/ob ]; then
              mkdir -p /opt/obsidian-headless
              npm install --prefix /opt/obsidian-headless --global \
                "obsidian-headless@${OBSIDIAN_HEADLESS_VERSION}"
            fi
            # Supervisor loop — restart on any non-zero exit. k8s
            # restartPolicy handles pod-level restarts; this handles
            # process-level restarts within the same pod.
            while true; do
              echo "[$(date -Iseconds)] starting ob sync --continuous" \
                | tee -a /var/lib/obsidian/sync.log
              /opt/obsidian-headless/bin/ob sync \
                --path /opt/data/Obsidian --continuous \
                2>&1 | tee -a /var/lib/obsidian/sync.log
              echo "[$(date -Iseconds)] ob sync exited rc=${PIPESTATUS[0]}, restarting in 5s" \
                | tee -a /var/lib/obsidian/sync.log
              sleep 5
            done
        env:
          - name: HOME
            value: /var/lib/obsidian
          - name: NPM_CONFIG_PREFIX
            value: /opt/obsidian-headless
          - name: NPM_CONFIG_CACHE
            value: /var/lib/obsidian/.npm
          - name: OBSIDIAN_HEADLESS_VERSION
            value: "0.0.11"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 384Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsUser: 0
          runAsNonRoot: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
          - name: data
            mountPath: /opt/data/Obsidian
            subPath: Obsidian
          - name: data
            mountPath: /opt/obsidian-headless
            subPath: obsidian-headless
          - name: obsidian-config
            mountPath: /var/lib/obsidian
          - name: obsidian-auth
            mountPath: /var/lib/obsidian/.config/obsidian-headless/auth_token
            subPath: auth_token
            readOnly: true
          - name: tmp
            mountPath: /tmp

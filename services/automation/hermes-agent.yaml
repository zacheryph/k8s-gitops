---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/secret.json
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: hermes-agent-oidc-credentials
stringData:
  client-id: ${OIDC_HERMES_CLIENT_ID}
  client-secret: ${OIDC_HERMES_CLIENT_SECRET}
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/gitrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: hermes-agent
spec:
  interval: 12h
  url: https://github.com/ultraworkers/hermes-agent-helm-chart
  ref:
    commit: e3b685d4d0288668a37216435742cd0a659ebc6c
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name hermes-agent
spec:
  interval: 1h
  chart:
    spec:
      chart: ./
      sourceRef:
        kind: GitRepository
        name: hermes-agent
  install:
    crds: Skip
  upgrade:
    crds: Skip
  values:
    image:
      repository: nousresearch/hermes-agent
      tag: "v2026.6.5@sha256:9ad3b04ec916ea2c2da22358fd43b024c788d74073210695af88bfc2e63869b4"

    # LLM via OpenRouter (base_url is the chart default; set explicitly for clarity)
    config:
      values:
        model:
          default: minimax/minimax-m3
          provider: auto
          base_url: https://openrouter.ai/api/v1

    # s6-overlay starts as root then drops to HERMES_UID/GID internally
    podSecurityContext:
      runAsUser: 0
      runAsNonRoot: false
    securityContext:
      allowPrivilegeEscalation: true
      readOnlyRootFilesystem: false
      runAsNonRoot: false
      capabilities:
        drop: []

    # Slack gateway — comma-separated Slack user IDs allowed to DM the agent
    env:
      SLACK_ALLOWED_USERS: ${HERMES_SLACK_ALLOWED_USERS}
      SIGNAL_ALLOWED_USERS: ${HERMES_SIGNAL_ALLOWED_USERS}
      HERMES_UID: "1000"
      HERMES_GID: "1000"

    # Secrets rendered into a Kubernetes Secret by the chart
    secrets:
      OPENROUTER_API_KEY: ${HERMES_OPENROUTER_API_KEY}
      SLACK_BOT_TOKEN: ${HERMES_SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${HERMES_SLACK_APP_TOKEN}
      API_SERVER_KEY: ${HERMES_API_SERVER_KEY}
      #SIGNAL_HTTP_URL: http://signal-cli-rest-api:8080
      #SIGNAL_ACCOUNT: ${HERMES_SIGNAL_ACCOUNT}

    persistence:
      enabled: true
      storageClass: longhorn
      size: 16Gi

    apiServer:
      enabled: true

    service:
      enabled: true

    extraObjects:
      - apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: hermes-agent
          labels:
            cluster.routine.sh/oidc-credentials: hermes-agent-oidc-credentials
        spec:
          parentRefs:
            - name: external
              namespace: gateway
          hostnames:
            - hermes.${CLUSTER_DOMAIN}
          rules:
            - backendRefs:
                - name: hermes-agent
                  port: 8642

    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi

    # ServiceAccount: use the pre-created `hermes-viewer` SA in this
    # namespace (see core/hermes-viewer/) and mount its token so the
    # in-cluster Python kubernetes client can authenticate automatically.
    # We set `create: false` because the SA is owned by the GitOps repo
    # (Flux-managed), not the chart.
    serviceAccount:
      create: false
      name: hermes-viewer
      automountServiceAccountToken: true

---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/gitrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: hermes-agent
spec:
  interval: 12h
  url: https://github.com/zacheryph/hermes-agent-helm-chart
  ref:
    branch: feat/web-dashboard
    commit: 7193ec5be50375b18e037d4a31613742cc10b0b3
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name hermes-agent
spec:
  interval: 1h
  chart:
    spec:
      chart: ./
      # Repackage on git revision changes; the fork's Chart.yaml version
      # stays 0.1.0, so the default ChartVersion strategy never rebuilds.
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: hermes-agent
  install:
    crds: Skip
  upgrade:
    crds: Skip
  values:
    image:
      repository: nousresearch/hermes-agent
      tag: "v2026.6.19@sha256:9f367c7756ef087661a361536a89f438d57a122b958dc23d82d456b1433e6e9e"

    bootstrap:
      overwrite: false

    # LLM via OpenRouter (base_url is the chart default; set explicitly for clarity)
    config:
      values:
        model:
          default: deepseek/deepseek-v4-pro
          provider: auto
          base_url: https://openrouter.ai/api/v1

    # s6-overlay starts as root then drops to HERMES_UID/GID (10000)
    # internally. The kubelet sets the projected SA token file's group
    # to the pod's effective GID — which is root's default GID (1000)
    # unless overridden by runAsGroup. fsGroup alone does NOT apply to
    # projected SA token volumes (kubelet manages those independently).
    # Without runAsGroup: 10000, the token file is root:1000 mode 0640
    # and the hermes process (gid=10000) gets PermissionError.
    podSecurityContext:
      runAsUser: 0
      runAsGroup: 10000
      runAsNonRoot: false
      fsGroup: 10000
      fsGroupChangePolicy: OnRootMismatch

    # s6-overlay requires these capabilities to initialize (chown
    # supervision directories, drop privileges to HERMES_UID/GID).
    # Dropping ALL then adding back only the minimum set reduces the
    # attack surface substantially vs retaining the default capability
    # set (which includes NET_RAW, SYS_PTRACE, and ~30 others).
    #   CHOWN        — chown /run/s6 and supervision directories
    #   DAC_OVERRIDE — access files regardless of permissions during init
    #   SETGID/SETUID — drop from root to the hermes user (10000:10000)
    #   KILL         — signal child processes during shutdown
    securityContext:
      allowPrivilegeEscalation: true
      readOnlyRootFilesystem: false
      runAsNonRoot: false
      capabilities:
        drop:
          - ALL
        add:
          - CHOWN
          - DAC_OVERRIDE
          - SETGID
          - SETUID
          - KILL

    # Slack gateway — comma-separated Slack user IDs allowed to DM the agent
    env:
      SLACK_ALLOWED_USERS: ${HERMES_SLACK_ALLOWED_USERS}
      SIGNAL_ALLOWED_USERS: ${HERMES_SIGNAL_ALLOWED_USERS}
      HERMES_YOLO_MODE: "1"

    # Secrets rendered into a Kubernetes Secret by the chart
    secrets:
      OPENROUTER_API_KEY: ${HERMES_OPENROUTER_API_KEY}
      SLACK_BOT_TOKEN: ${HERMES_SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${HERMES_SLACK_APP_TOKEN}
      API_SERVER_KEY: ${HERMES_API_SERVER_KEY}
      WEBHOOK_SECRET: ${HERMES_WEBHOOK_SECRET}
      #SIGNAL_HTTP_URL: http://signal-cli-rest-api:8080
      #SIGNAL_ACCOUNT: ${HERMES_SIGNAL_ACCOUNT}

    persistence:
      enabled: true
      storageClass: longhorn
      size: 16Gi

    apiServer:
      enabled: true

    # Hermes webhook listener (port 8644) — external services like GitHub,
    # Stripe, CI/CD, etc. POST events here to trigger agent runs. HMAC-secret
    # authenticated per subscription; the global WEBHOOK_SECRET below is the
    # fallback for static routes and acts as a default for dynamic
    # subscriptions. Subscriptions are created at runtime via
    # `hermes webhook subscribe` and persist in HERMES_HOME.
    webhook:
      enabled: true

    # Web dashboard authenticates directly against pocket-id as a public
    # PKCE client (no client secret); the gateway-level OIDC SecurityPolicy
    # is intentionally not applied to this route to avoid a double login.
    dashboard:
      enabled: true
      publicUrl: https://hermes.${CLUSTER_DOMAIN}
      auth:
        oidc:
          issuer: ${OIDC_ISSUER_URL}
          clientId: ${OIDC_HERMES_DASHBOARD_CLIENT_ID}

    service:
      enabled: true

    extraObjects:
      - apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: hermes-agent
          annotations:
            dns.routine.sh/external: "true"
        spec:
          parentRefs:
            - name: external
              namespace: gateway
          hostnames:
            - hermes.${CLUSTER_DOMAIN}
          rules:
            - backendRefs:
                - name: hermes-agent
                  port: 9119

      # Separate hostname for the webhook listener so subscription URLs and
      # HMAC signatures aren't mixed with dashboard cookies. Path prefix is
      # kept open (`/`) — hermes-agent inspects the path inside its handler
      # and returns 404 for non-subscription routes.
      - apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: hermes-agent-webhook
          annotations:
            dns.routine.sh/external: "true"
        spec:
          parentRefs:
            - name: external
              namespace: gateway
          hostnames:
            - hermes-webhook.${CLUSTER_DOMAIN}
          rules:
            - backendRefs:
                - name: hermes-agent
                  port: 8644

    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi

    # HTTP health probes against the API server (port 8642). The /health
    # endpoint returns 200 once the gateway is fully initialized.
    probes:
      startup:
        httpGet:
          path: /health
          port: api-server
        initialDelaySeconds: 10
        periodSeconds: 5
        failureThreshold: 30   # up to 150s for cold start
      liveness:
        httpGet:
          path: /health
          port: api-server
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 3
      readiness:
        httpGet:
          path: /health
          port: api-server
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3

    # Prevent voluntary eviction during node drains (single-replica service).
    pdb:
      enabled: true
      minAvailable: 1

    # ServiceAccount: use the pre-created `hermes-viewer` SA in this
    # namespace (see core/hermes-viewer/) and mount its token so the
    # in-cluster Python kubernetes client can authenticate automatically.
    # We set `create: false` because the SA is owned by the GitOps repo
    # (Flux-managed), not the chart.
    serviceAccount:
      create: false
      name: hermes-viewer
      automountServiceAccountToken: true

# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app neolink
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      app:
        containers:
          app:
            image:
              repository: quantumentangledandy/neolink
              tag: latest@sha256:4eebf499c20f8de740d8c32163f665e41fd0f342be3b1174828b3b8bd7def59d
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: app
        ports:
          rtsp:
            port: 8554
    persistence:
      config:
        type: configMap
        name: neolink-config
        globalMounts:
          - path: /etc/neolink.toml
            subPath: neolink.toml
            readOnly: true
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/configmap.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: neolink-config
data:
  neolink.toml: |
    bind = "0.0.0.0"
    bind_port = 8554

    [[cameras]]
    name = "reolink-e1"
    push_notifications = false
    username = "${CAMERA_REOLINK_E1_USERNAME}"
    password = "${CAMERA_REOLINK_E1_PASSWORD}"
    address = "${CAMERA_REOLINK_E1_ADDRESS}"

# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/persistentvolumeclaim.json
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-assistant-config
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
  storageClassName: longhorn
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app home-assistant
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    defaultPodOptions:
      # so we can receive mDNS traffic
      dnsPolicy: ClusterFirstWithHostNet
      hostNetwork: true
    controllers:
      app:
        containers:
          app:
            image:
              repository: homeassistant/home-assistant
              tag: 2026.7.2@sha256:1476924357b46e80735c13e94232ba5c853cac052e9df4bb28d50fa56348097b
            env:
              DATABASE_URL: postgresql://home_assistant:${POSTGRES_HOME_ASSISTANT_PASSWORD}@${POSTGRES_ADDRESS}/home_assistant
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
                cpu: 1
    service:
      app:
        controller: app
        ports:
          http:
            port: 8123
    route:
      app:
        enabled: true
        kind: HTTPRoute
        annotations:
          dns.routine.sh/external: "true"
        hostnames: [ "home-assistant.${CLUSTER_DOMAIN}" ]
        parentRefs:
          - name: external
            namespace: gateway
    persistence:
      config:
        existingClaim: home-assistant-config
      tmp:
        type: emptyDir

# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/helmrepository_v1.json
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: mattermost
spec:
  interval: 12h
  url: https://helm.mattermost.com
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mattermost
spec:
  interval: 1h
  chart:
    spec:
      chart: mattermost-team-edition
      version: 6.6.102
      sourceRef:
        kind: HelmRepository
        name: mattermost
  values:
    mysql:
      enabled: false

    externalDB:
      enabled: true
      externalDriverType: postgres
      externalConnectionString: >-
        mattermost:${MATTERMOST_DB_PASSWORD}@${POSTGRES_ADDRESS}/mattermost?sslmode=disable&connect_timeout=10

    service:
      type: ClusterIP
      externalPort: 8065
      internalPort: 8065

    ingress:
      enabled: false

    persistence:
      data:
        enabled: true
        size: 16Gi
        accessMode: ReadWriteOnce
      plugins:
        enabled: true
        size: 2Gi
        accessMode: ReadWriteOnce

    config:
      MM_SERVICESETTINGS_SITEURL: https://chat.${CLUSTER_DOMAIN}
      MM_PLUGINSETTINGS_CLIENTDIRECTORY: "./client/plugins"

    deploymentStrategy:
      type: Recreate

    securityContext:
      fsGroup: 2000
      fsGroupChangePolicy: OnRootMismatch
      runAsGroup: 2000
      runAsUser: 2000

    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

    testJob:
      enabled: false
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mattermost
spec:
  hostnames:
    - chat.${CLUSTER_DOMAIN}
  parentRefs:
    - name: external
      namespace: gateway
  rules:
    - backendRefs:
        - name: mattermost-team-edition
          port: 8065
      matches:
        - path:
            type: PathPrefix
            value: /

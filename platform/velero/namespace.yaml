# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/namespace.json
---
apiVersion: v1
kind: Namespace
metadata:
  name: velero
  labels:
    app.kubernetes.io/part-of: velero
    # Velero needs privileged PSA because:
    # - The node-agent DaemonSet runs on every node for host-level volume backups
    # - The server interacts with the CSI snapshot API
    # - The restic/kopia uploader needs host-level access for filesystem-level backups
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged

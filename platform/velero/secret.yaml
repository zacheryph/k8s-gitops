# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/secret.json
#
# Velero S3 credentials for Backblaze B2. The key id / application key live in
# the SOPS-encrypted cluster-secrets Secret (flux-system) and are substituted
# here by Flux postBuild — same pattern as every other credential in this repo.
# Nothing secret is committed in this file.
#
# Add these to config/secrets.yaml (via `sops config/secrets.yaml`):
#   VELERO_B2_KEY_ID:          <B2 application keyID>
#   VELERO_B2_APPLICATION_KEY: <B2 applicationKey>
#   VELERO_B2_BUCKET:          <bucket name>
#   VELERO_B2_REGION:          <region, e.g. us-west-004>
#   VELERO_B2_ENDPOINT:        <s3 endpoint, e.g. s3.us-west-004.backblazeb2.com>
#
# Use a B2 Application Key scoped to the one bucket (read/write/list/delete) —
# NOT the master key.
---
apiVersion: v1
kind: Secret
metadata:
  name: velero-s3-credentials
  namespace: velero
type: Opaque
stringData:
  # Velero reads this as an AWS credentials file (INI format).
  # The [default] profile must match the backupStorageLocation name.
  cloud: |
    [default]
    aws_access_key_id=${VELERO_B2_KEY_ID}
    aws_secret_access_key=${VELERO_B2_APPLICATION_KEY}

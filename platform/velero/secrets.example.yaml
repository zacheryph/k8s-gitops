# Velero S3 credentials — create this Secret before Flux reconciles the HelmRelease.
# 
# 1. Create a MinIO user for Velero:
#    kubectl -n minio exec deploy/minio -- mc admin user add local <access-key> <secret-key>
#    kubectl -n minio exec deploy/minio -- mc admin policy attach local readwrite --user <access-key>
#
# 2. Create the velero bucket:
#    kubectl -n minio exec deploy/minio -- mc mb local/velero
#
# 3. Apply this Secret:
#    kubectl create secret generic velero-s3-credentials \
#      -n velero \
#      --from-literal=cloud="[default]
#aws_access_key_id=<access-key>
#aws_secret_access_key=<secret-key>"
#
# Values below are placeholders — replace with real credentials.
# DO NOT commit real credentials to git.
---
apiVersion: v1
kind: Secret
metadata:
  name: velero-s3-credentials
  namespace: velero
type: Opaque
stringData:
  # Velero reads this as an AWS credentials file (INI format).
  # The [default] profile must match the backupStorageLocation name.
  cloud: |
    [default]
    aws_access_key_id=<redacted>
    aws_secret_access_key=<redacted>
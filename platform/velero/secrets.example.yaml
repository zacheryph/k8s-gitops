# Velero S3 credentials for Backblaze B2 — create this Secret before
# Flux reconciles the HelmRelease.
#
# 1. In the B2 web console (https://secure.backblaze.com):
#    a. Create a bucket (private, default encryption is fine — Velero
#       encrypts client-side, so B2's server-side encryption is a second
#       layer but not required).
#    b. Create an Application Key scoped to that one bucket with
#       read/write/list/delete perms — NOT the master key.
#    c. Note the keyID, applicationKey, bucket name, endpoint, and region.
#
# 2. Apply this Secret (replace <...> placeholders):
#    kubectl create secret generic velero-s3-credentials \
#      -n velero \
#      --from-literal=cloud="[default]
#aws_access_key_id=<keyID>
#aws_secret_access_key=<applicationKey>"
#
# 3. Verify the cluster-secrets Secret in flux-system has:
#    VELERO_B2_BUCKET=<bucket-name>
#    VELERO_B2_REGION=<region>              # e.g. us-west-004
#    VELERO_B2_ENDPOINT=<s3-endpoint>       # e.g. s3.us-west-004.backblazeb2.com
#
# Values below are placeholders — replace with real credentials.
# DO NOT commit real credentials to git.
---
apiVersion: v1
kind: Secret
metadata:
  name: velero-s3-credentials
  namespace: velero
type: Opaque
stringData:
  # Velero reads this as an AWS credentials file (INI format).
  # The [default] profile must match the backupStorageLocation name.
  cloud: |
    [default]
    aws_access_key_id=<redacted>
    aws_secret_access_key=<redacted>

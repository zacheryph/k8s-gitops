# Kyverno ClusterPolicy: annotation-driven Velero backup.
#
# Annotate a PersistentVolumeClaim OR a HelmRelease with
#   backup.zacheryph/enabled: "true"
# and Kyverno generates a Velero Schedule for that namespace.
# Remove the annotation → Kyverno deletes the schedule.
#
# ---
# Usage — PVC-level:
#
#   apiVersion: v1
#   kind: PersistentVolumeClaim
#   metadata:
#     namespace: immich
#     name: photos-pool
#     annotations:
#       backup.zacheryph/enabled: "true"
#       backup.zacheryph/schedule: "0 23 * * *"   # optional (default: 0 1 * * *)
#       backup.zacheryph/ttl: "720h0m0s"          # optional (default: 720h = 30d)
#
# ---
# Usage — HelmRelease-level (backs up the entire namespace):
#
#   apiVersion: helm.toolkit.fluxcd.io/v2
#   kind: HelmRelease
#   metadata:
#     namespace: immich
#     name: immich
#     annotations:
#       backup.zacheryph/enabled: "true"
#       backup.zacheryph/schedule: "0 2 * * *"
#       backup.zacheryph/ttl: "2160h0m0s"         # 90d for app config
#
# ---
# Both resources trigger the same policy. If a namespace has multiple
# annotated resources, each generates its own Schedule — they'll run
# overlapping backups (low cost: metadata is KB-MB). Fine for 1-2 per
# namespace. If you have 5+ annotated resources in one namespace, use a
# namespace-level annotation instead.
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-velero-backup
  annotations:
    policies.kyverno.io/title: Generate Velero Backup Schedule
    policies.kyverno.io/subject: Schedule
    policies.kyverno.io/description: >
      Generate a Velero Schedule for any PVC or HelmRelease annotated
      with backup.zacheryph/enabled: "true". The Schedule backs up the
      resource's namespace. Uses CSI snapshots for PVC data.
spec:
  generateExisting: true
  rules:
    - name: generate-from-pvc
      match:
        any:
          - resources:
              kinds: ["PersistentVolumeClaim"]
      preconditions:
        all:
          - key: '{{ request.object.metadata.annotations."backup.zacheryph/enabled" }}'
            operator: Equals
            value: "true"
      generate:
        apiVersion: velero.io/v1
        kind: Schedule
        name: "auto-pvc-{{ request.object.metadata.namespace }}-{{ request.object.metadata.name }}"
        namespace: velero
        synchronize: true
        data:
          spec:
            schedule: "{{ `{{ request.object.metadata.annotations.\"backup.zacheryph/schedule\" || \"0 1 * * *\" }}` }}"
            useOwnerReferencesInBackup: true
            template:
              ttl: "{{ `{{ request.object.metadata.annotations.\"backup.zacheryph/ttl\" || \"720h0m0s\" }}` }}"
              includedNamespaces:
                - "{{ request.object.metadata.namespace }}"
              snapshotVolumes: true
              metadata:
                labels:
                  backup-tier: per-pvc
                  backup.zacheryph/generated-by: kyverno
                  backup.zacheryph/source-kind: PersistentVolumeClaim
                  backup.zacheryph/source-name: "{{ request.object.metadata.name }}"

    - name: generate-from-helmrelease
      match:
        any:
          - resources:
              kinds: ["HelmRelease"]
              apiGroups: ["helm.toolkit.fluxcd.io"]
      preconditions:
        all:
          - key: '{{ request.object.metadata.annotations."backup.zacheryph/enabled" }}'
            operator: Equals
            value: "true"
      generate:
        apiVersion: velero.io/v1
        kind: Schedule
        name: "auto-hr-{{ request.object.metadata.namespace }}-{{ request.object.metadata.name }}"
        namespace: velero
        synchronize: true
        data:
          spec:
            schedule: "{{ `{{ request.object.metadata.annotations.\"backup.zacheryph/schedule\" || \"0 1 * * *\" }}` }}"
            useOwnerReferencesInBackup: true
            template:
              ttl: "{{ `{{ request.object.metadata.annotations.\"backup.zacheryph/ttl\" || \"720h0m0s\" }}` }}"
              includedNamespaces:
                - "{{ request.object.metadata.namespace }}"
              snapshotVolumes: true
              metadata:
                labels:
                  backup-tier: per-helmrelease
                  backup.zacheryph/generated-by: kyverno
                  backup.zacheryph/source-kind: HelmRelease
                  backup.zacheryph/source-name: "{{ request.object.metadata.name }}"

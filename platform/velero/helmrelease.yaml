# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: velero
  namespace: velero
spec:
  interval: 12h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 12.0.3
  url: oci://ghcr.io/vmware-tanzu/helm-charts/velero
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: velero
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      strategy: rollback
      retries: 3
  values:
    # Node-agent (unified replacement for restic) for filesystem-level
    # backups of volumes that don't support CSI snapshots: hostPath, NFS,
    # emptyDir, and any PVC without a CSI driver.
    nodeAgent:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi

    # Backblaze B2 S3-compatible backend.
    # Credentials come from the velero-s3-credentials Secret, which is rendered
    # from cluster-secrets (VELERO_B2_KEY_ID / VELERO_B2_APPLICATION_KEY) — see
    # secret.yaml and README § "One-time bootstrap".
    configuration:
      # EnableCSI is still required to turn on CSI snapshot support. The CSI
      # plugin itself is built into Velero core as of v1.14 (no separate
      # velero-plugin-for-csi initContainer needed).
      features: EnableCSI
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: ${VELERO_B2_BUCKET}
          prefix: backups
          config:
            region: ${VELERO_B2_REGION}
            s3Url: https://${VELERO_B2_ENDPOINT}
            s3ForcePathStyle: "true"
      volumeSnapshotLocation:
        - name: default
          provider: aws
          config:
            region: ${VELERO_B2_REGION}

    # Credentials are rendered from cluster-secrets via secret.yaml
    credentials:
      existingSecret: velero-s3-credentials

    # Resource limits
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # Metrics + ServiceMonitor for Prometheus
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

    # Plugin: AWS S3 backend (B2). CSI snapshot support is built into Velero
    # core since v1.14 — no separate velero-plugin-for-csi plugin required.
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.13.0@sha256:0b08ec0d150424fa914487e6665d7c84fff0c6a8eca76a23fa6d09e621d36d8a
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - name: plugins
            mountPath: /target

    # Backup schedules (managed by the chart)
    schedules:
      # Daily cluster-wide backup at 01:00 — resource manifests only, no volume
      # snapshots. This is the broad "I deleted a resource" safety net; keeping
      # it metadata-only avoids snapshotting every PVC in the cluster daily.
      daily-cluster:
        disabled: false
        schedule: "0 1 * * *"
        useOwnerReferencesInBackup: true
        template:
          ttl: 720h0m0s           # 30 days
          includedNamespaces:
            - "*"
          excludedNamespaces:
            - kube-system
            - kube-public
            - kube-node-lease
            - flux-system
            - velero
            - longhorn-system
          snapshotVolumes: false
          defaultVolumesToFsBackup: false
          metadata:
            labels:
              backup-tier: daily
      # Daily critical-namespaces backup at 00:00 — narrow scope for fast targeted
      # restore. This one DOES snapshot volumes (Longhorn CSI), but the
      # velero-volume-policy resourcePolicy skips NFS-backed media volumes
      # (media-pool, photos-pool) so only app/DB data is captured.
      daily-critical:
        disabled: false
        schedule: "0 0 * * *"
        useOwnerReferencesInBackup: true
        template:
          ttl: 720h0m0s
          includedNamespaces:
            - immich
            - minio
            - home-assistant
            - forgejo
          snapshotVolumes: true
          defaultVolumesToFsBackup: false
          resourcePolicy:
            kind: configmap
            name: velero-volume-policy
          metadata:
            labels:
              backup-tier: daily-critical
      # Weekly full backup on Sunday 03:00, kept 90 days — resource manifests
      # only (same rationale as daily-cluster).
      weekly-full:
        disabled: false
        schedule: "0 3 * * 0"
        useOwnerReferencesInBackup: true
        template:
          ttl: 2160h0m0s           # 90 days
          includedNamespaces:
            - "*"
          excludedNamespaces:
            - kube-system
            - kube-public
            - kube-node-lease
            - flux-system
            - velero
            - longhorn-system
          snapshotVolumes: false
          defaultVolumesToFsBackup: false
          metadata:
            labels:
              backup-tier: weekly

    # Deploy the node-agent DaemonSet
    deployNodeAgent: true
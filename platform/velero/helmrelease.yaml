# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/helmrepository_v1.json
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: velero
  namespace: velero
spec:
  interval: 12h
  # Velero's chart is only published as a classic Helm repo, not an OCI artifact.
  url: https://vmware-tanzu.github.io/helm-charts
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 1h
  chart:
    spec:
      chart: velero
      version: 12.1.0
      sourceRef:
        kind: HelmRepository
        name: velero
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      strategy: rollback
      retries: 3
  values:
    # Node-agent (unified replacement for restic) for filesystem-level
    # backups of volumes that don't support CSI snapshots: hostPath, NFS,
    # emptyDir, and any PVC without a CSI driver.
    nodeAgent:
      enabled: true
      # k0s puts the kubelet root under /var/lib/k0s/kubelet, not the default
      # /var/lib/kubelet. Without these the node-agent aborts on startup:
      # "unexpected directory structure for host-pods volume".
      podVolumePath: /var/lib/k0s/kubelet/pods
      pluginVolumePath: /var/lib/k0s/kubelet/plugins
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi

    # Backblaze B2 S3-compatible backend.
    # Credentials come from the velero-s3-credentials Secret, which is rendered
    # from cluster-secrets (VELERO_B2_KEY_ID / VELERO_B2_APPLICATION_KEY) — see
    # secret.yaml and README § "One-time bootstrap".
    configuration:
      # EnableCSI is still required to turn on CSI snapshot support. The CSI
      # plugin itself is built into Velero core as of v1.14 (no separate
      # velero-plugin-for-csi initContainer needed).
      features: EnableCSI
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: ${VELERO_B2_BUCKET}
          prefix: backups
          config:
            region: ${VELERO_B2_REGION}
            s3Url: https://${VELERO_B2_ENDPOINT}
            s3ForcePathStyle: "true"
            # Backblaze B2 rejects the AWS SDK's default flexible-checksum
            # headers (x-amz-sdk-checksum-algorithm) with
            # "InvalidArgument / XAmzContentSHA256Mismatch". Empty string
            # disables checksum so PutObject succeeds. See velero-plugin-for-aws
            # README § S3-compatible storage.
            checksumAlgorithm: ""
      volumeSnapshotLocation:
        - name: default
          provider: aws
          config:
            region: ${VELERO_B2_REGION}

    # Credentials are rendered from cluster-secrets via secret.yaml
    credentials:
      existingSecret: velero-s3-credentials

    # Resource limits
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # Metrics + ServiceMonitor for Prometheus
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

    # Plugin: AWS S3 backend (B2). CSI snapshot support is built into Velero
    # core since v1.14 — no separate velero-plugin-for-csi plugin required.
    initContainers:
      # NOTE: pinned to the unreleased `main` build, NOT a tagged release.
      # Releases up to and including v1.14.2 unconditionally set PutObject's
      # Tagging field (`Tagging: aws.String(o.tagging)`), so even with no
      # tagging configured the AWS SDK emits an empty `x-amz-tagging:` header.
      # Backblaze B2 rejects ANY x-amz-tagging header with HTTP 400
      # "InvalidArgument: Unsupported header 'x-amz-tagging'", which fails every
      # backup at the final velero-backup.json upload. The fix (only set Tagging
      # when non-empty) is merged to main but not yet released. Revert to a
      # pinned vX.Y.Z release once a release > v1.14.2 ships the fix.
      # Renovate ignores this floating tag — bump the digest by hand.
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:main@sha256:a77f07a0ad6974d802653d4d1f3ed67db46f59649f29a6b5d29328624010c6a5
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - name: plugins
            mountPath: /target

    # Backup schedules (managed by the chart).
    #
    # Two daily schedules + one weekly:
    #   daily-infra — stateless infrastructure (manifests only)
    #   daily       — everything non-system, with CSI snapshots → B2
    #   weekly      — everything non-system, 90d retention, no snapshots
    #
    # New namespaces are auto-included in daily/weekly via wildcard + exclusions.
    # The only list to maintain is daily-infra (10 namespaces, changes rarely).
    schedules:
      # Infrastructure namespaces — cluster-level services that are Flux-managed
      # and stateless. Resource manifests only; no PVC data worth snapshotting.
      daily-infra:
        disabled: false
        schedule: "0 1 * * *"
        useOwnerReferencesInBackup: true
        template:
          ttl: 720h0m0s           # 30 days
          includedNamespaces:
            - cert-manager
            - crossplane
            - dns
            - gateway
            - hardware-system
            - k0s-autopilot
            - kyverno
            - metallb-system
            - operators-system
            - security
          snapshotVolumes: false
          defaultVolumesToFsBackup: false
          metadata:
            labels:
              backup-tier: daily-infra
      # Everything non-system, with CSI snapshots + data movement to B2.
      # New namespaces are auto-included via wildcard — nothing to update.
      # The velero-volume-policy ConfigMap skips NFS-backed volumes (media-pool,
      # photos-pool) so only Longhorn CSI PVCs get snapshotted.
      daily:
        disabled: false
        schedule: "0 0 * * *"
        useOwnerReferencesInBackup: true
        template:
          ttl: 720h0m0s           # 30 days
          includedNamespaces:
            - "*"
          excludedNamespaces:
            - kube-system
            - kube-public
            - kube-node-lease
            - flux-system
            - velero
            - longhorn-system
          snapshotVolumes: true
          defaultVolumesToFsBackup: false
          # Take a CSI (Longhorn) snapshot, then move the data off-cluster to
          # B2 via the node-agent (Kopia). Requires the longhorn-velero
          # VolumeSnapshotClass (volumesnapshotclass.yaml). Without this the
          # snapshot would stay in-cluster only and never reach B2.
          snapshotMoveData: true
          resourcePolicy:
            kind: configmap
            name: velero-volume-policy
          metadata:
            labels:
              backup-tier: daily
      # Weekly catch-all for extended retention — same scope as daily, no
      # snapshots, kept 90 days.
      weekly:
        disabled: false
        schedule: "0 3 * * 0"
        useOwnerReferencesInBackup: true
        template:
          ttl: 2160h0m0s           # 90 days
          includedNamespaces:
            - "*"
          excludedNamespaces:
            - kube-system
            - kube-public
            - kube-node-lease
            - flux-system
            - velero
            - longhorn-system
          snapshotVolumes: false
          defaultVolumesToFsBackup: false
          metadata:
            labels:
              backup-tier: weekly

    # Deploy the node-agent DaemonSet
    deployNodeAgent: true
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/helmrepository_v1.json
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: velero
  namespace: velero
spec:
  interval: 12h
  # Velero's chart is only published as a classic Helm repo, not an OCI artifact.
  url: https://vmware-tanzu.github.io/helm-charts
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 1h
  chart:
    spec:
      chart: velero
      version: 12.1.0
      sourceRef:
        kind: HelmRepository
        name: velero
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      strategy: rollback
      retries: 3
  values:
    # Node-agent (unified replacement for restic) for filesystem-level
    # backups of volumes that don't support CSI snapshots: hostPath, NFS,
    # emptyDir, and any PVC without a CSI driver.
    nodeAgent:
      enabled: true
      # k0s puts the kubelet root under /var/lib/k0s/kubelet, not the default
      # /var/lib/kubelet. Without these the node-agent aborts on startup:
      # "unexpected directory structure for host-pods volume".
      podVolumePath: /var/lib/k0s/kubelet/pods
      pluginVolumePath: /var/lib/k0s/kubelet/plugins
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi

    # Backblaze B2 S3-compatible backend.
    # Credentials come from the velero-s3-credentials Secret, which is rendered
    # from cluster-secrets (VELERO_B2_KEY_ID / VELERO_B2_APPLICATION_KEY) — see
    # secret.yaml and README § "One-time bootstrap".
    configuration:
      # EnableCSI is still required to turn on CSI snapshot support. The CSI
      # plugin itself is built into Velero core as of v1.14 (no separate
      # velero-plugin-for-csi initContainer needed).
      features: EnableCSI
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: ${VELERO_B2_BUCKET}
          prefix: backups
          config:
            region: ${VELERO_B2_REGION}
            s3Url: https://${VELERO_B2_ENDPOINT}
            s3ForcePathStyle: "true"
            # Backblaze B2 rejects the AWS SDK's default flexible-checksum
            # headers (x-amz-sdk-checksum-algorithm) with
            # "InvalidArgument / XAmzContentSHA256Mismatch". Empty string
            # disables checksum so PutObject succeeds. See velero-plugin-for-aws
            # README § S3-compatible storage.
            checksumAlgorithm: ""
      volumeSnapshotLocation:
        - name: default
          provider: aws
          config:
            region: ${VELERO_B2_REGION}

    # Credentials are rendered from cluster-secrets via secret.yaml
    credentials:
      existingSecret: velero-s3-credentials

    # Resource limits
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # Metrics + ServiceMonitor for Prometheus
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

    # Plugin: AWS S3 backend (B2). CSI snapshot support is built into Velero
    # core since v1.14 — no separate velero-plugin-for-csi plugin required.
    initContainers:
      # NOTE: pinned to the unreleased `main` build, NOT a tagged release.
      # Releases up to and including v1.14.2 unconditionally set PutObject's
      # Tagging field (`Tagging: aws.String(o.tagging)`), so even with no
      # tagging configured the AWS SDK emits an empty `x-amz-tagging:` header.
      # Backblaze B2 rejects ANY x-amz-tagging header with HTTP 400
      # "InvalidArgument: Unsupported header 'x-amz-tagging'", which fails every
      # backup at the final velero-backup.json upload. The fix (only set Tagging
      # when non-empty) is merged to main but not yet released. Revert to a
      # pinned vX.Y.Z release once a release > v1.14.2 ships the fix.
      # Renovate ignores this floating tag — bump the digest by hand.
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:main@sha256:a77f07a0ad6974d802653d4d1f3ed67db46f59649f29a6b5d29328624010c6a5
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - name: plugins
            mountPath: /target

    # Backup schedules (managed by the chart)
    schedules:
      # Daily cluster-wide backup at 01:00 — resource manifests only, no volume
      # snapshots. This is the broad "I deleted a resource" safety net; keeping
      # it metadata-only avoids snapshotting every PVC in the cluster daily.
      daily-cluster:
        disabled: false
        schedule: "0 1 * * *"
        useOwnerReferencesInBackup: true
        template:
          ttl: 720h0m0s           # 30 days
          includedNamespaces:
            - "*"
          excludedNamespaces:
            - kube-system
            - kube-public
            - kube-node-lease
            - flux-system
            - velero
            - longhorn-system
          snapshotVolumes: false
          defaultVolumesToFsBackup: false
          metadata:
            labels:
              backup-tier: daily
      # Daily critical-namespaces backup at 00:00 — narrow scope for fast targeted
      # restore. This one DOES snapshot volumes (Longhorn CSI), but the
      # velero-volume-policy resourcePolicy skips NFS-backed media volumes
      # (media-pool, photos-pool) so only app/DB data is captured.
      daily-critical:
        disabled: false
        schedule: "0 0 * * *"
        useOwnerReferencesInBackup: true
        template:
          ttl: 720h0m0s
          includedNamespaces:
            - immich
            - minio
            - home-assistant
            - forgejo
          snapshotVolumes: true
          defaultVolumesToFsBackup: false
          resourcePolicy:
            kind: configmap
            name: velero-volume-policy
          metadata:
            labels:
              backup-tier: daily-critical
      # Weekly full backup on Sunday 03:00, kept 90 days — resource manifests
      # only (same rationale as daily-cluster).
      weekly-full:
        disabled: false
        schedule: "0 3 * * 0"
        useOwnerReferencesInBackup: true
        template:
          ttl: 2160h0m0s           # 90 days
          includedNamespaces:
            - "*"
          excludedNamespaces:
            - kube-system
            - kube-public
            - kube-node-lease
            - flux-system
            - velero
            - longhorn-system
          snapshotVolumes: false
          defaultVolumesToFsBackup: false
          metadata:
            labels:
              backup-tier: weekly

    # Deploy the node-agent DaemonSet
    deployNodeAgent: true
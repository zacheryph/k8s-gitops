---
apiVersion: v1
kind: Secret
metadata:
  name: rfc2136-tsig
  namespace: dns
type: Opaque
stringData:
  tsig-secret: "TqqKxVYG0Y68986d1zUe5bCyi3I0r9Cf8OnQHBDnwLo="
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bind-config
  namespace: dns
data:
  named.conf: |
    options {
      directory "/var/bind/data";
      listen-on { any; };
      listen-on-v6 { none; };
      allow-query { any; };
      recursion no;
      minimal-responses yes;
      dnssec-validation auto;
    };

    key "external-dns." {
      algorithm hmac-sha256;
      secret "TqqKxVYG0Y68986d1zUe5bCyi3I0r9Cf8OnQHBDnwLo=";
    };

    zone "example.com" {
      type primary;
      file "/var/bind/data/example.com.zone";
      allow-update { key "external-dns."; };
      allow-transfer { none; };
    };
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bind-seed-zone
  namespace: dns
data:
  example.com.zone: |
    $ORIGIN example.com.
    $TTL 60
    @   IN SOA  ns1.example.com. admin.example.com. (
                2026061601 ; serial
                3600       ; refresh
                600        ; retry
                86400      ; expire
                60 )       ; minimum
    @   IN NS   ns1.example.com.
    ns1 IN A    10.72.16.51
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bind-data
  namespace: dns
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bind
  namespace: dns
  labels:
    app.kubernetes.io/name: bind
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bind
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bind
    spec:
      securityContext:
        fsGroup: 101
      initContainers:
        - name: seed-zone
          image: mirror.gcr.io/busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -f /var/bind/data/example.com.zone ]; then
                cp /seed/example.com.zone /var/bind/data/
                chown 100:101 /var/bind/data/example.com.zone
              fi
          volumeMounts:
            - name: data
              mountPath: /var/bind/data
            - name: seed
              mountPath: /seed
              readOnly: true
      containers:
        - name: bind
          image: internetsystemsconsortium/bind9:9.20
          imagePullPolicy: IfNotPresent
          args:
            - named
            - -c
            - /etc/bind/named.conf
            - -g
            - -u
            - bind
          ports:
            - containerPort: 53
              name: dns
              protocol: UDP
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/bind/named.conf
              subPath: named.conf
              readOnly: true
            - name: data
              mountPath: /var/bind/data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 101
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: bind-config
        - name: seed
          configMap:
            name: bind-seed-zone
        - name: data
          persistentVolumeClaim:
            claimName: bind-data
---
apiVersion: v1
kind: Service
metadata:
  name: bind
  namespace: dns
  annotations:
    metallb.universe.tf/loadBalancerIPs: 10.72.16.51
  labels:
    app.kubernetes.io/name: bind
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: bind
  ports:
    - name: dns
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP

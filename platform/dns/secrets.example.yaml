---
# This file documents the Secret shapes; actual Secrets are created
# out-of-band (see platform/dns/README.md). They are NOT applied by kustomize.
apiVersion: v1
kind: Secret
metadata:
  name: adguard-configuration
  namespace: dns
type: Opaque
stringData:
  url: REPLACE_WITH_ADGUARD_HOME_URL
  user: REPLACE_WITH_ADGUARD_HOME_USERNAME
  password: REPLACE_WITH_ADGUARD_HOME_PASSWORD
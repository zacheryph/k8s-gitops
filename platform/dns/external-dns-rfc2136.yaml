---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: bitnami-external-dns-rfc2136
spec:
  interval: 12h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 8.7.10
  url: oci://registry-1.docker.io/bitnamicharts/external-dns
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-rfc2136
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: bitnami-external-dns-rfc2136
  upgrade:
    crds: CreateReplace
  values:
    provider: rfc2136
    registry: txt
    txtOwnerId: external-dns-rfc2136
    policy: sync
    interval: 1m
    logLevel: info
    sources:
      - service
      - ingress
      - gateway-httproute
    domainFilters:
      - example.com
    rfc2136:
      host: "bind.dns.svc.cluster.local"
      port: 53
      zone: example.com
      tsigKeyname: external-dns.
      tsigSecretAlg: hmac-sha256
      existingSecret: rfc2136-tsig
      tsigAXFR: false
      minTTL: 60s
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
    podSecurityContext:
      fsGroup: 1001
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1001

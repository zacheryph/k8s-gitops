---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-cloudflare
  namespace: dns
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: 1.21.1
      sourceRef:
        kind: HelmRepository
        name: external-dns
  upgrade:
    crds: CreateReplace
  values:
    provider:
      name: cloudflare
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-configuration
            key: token
    extraArgs:
      - --annotation-filter=dns.routine.sh/external=true
      - --cloudflare-proxied
      - --default-targets=${CLOUD_EXTERNAL_IP}
    registry: txt
    txtOwnerId: external-dns-cloudflare
    policy: sync
    interval: 1m
    logLevel: info
    sources:
      - service
      - ingress
      - gateway-httproute
    domainFilters:
      - ${CLUSTER_DOMAIN}
      - ${WEB_DOMAIN}
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
    podSecurityContext:
      fsGroup: 65534
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      privileged: false
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      capabilities:
        drop:
          - ALL

---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/secret.json
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: alertmanager-oidc-credentials
stringData:
  client-id: ${OIDC_ALERTMANAGER_CLIENT_ID}
  client-secret: ${OIDC_ALERTMANAGER_CLIENT_SECRET}
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/secret.json
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: prometheus-oidc-credentials
stringData:
  client-id: ${OIDC_PROMETHEUS_CLIENT_ID}
  client-secret: ${OIDC_PROMETHEUS_CLIENT_SECRET}
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  interval: 1h
  values:
    cleanPrometheusOperatorObjectNames: true

    crds:
      enabled: true
      upgradeJob:
        enabled: true

    global:
      rbac:
        create: true

    alertmanager:
      enabled: true
      alertmanagerSpec:
        externalURL: "https://alertmanager.${CLUSTER_DOMAIN}"
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi
      route:
        main:
          enabled: true
          hostnames: [ "alertmanager.${CLUSTER_DOMAIN}" ]
          parentRefs:
            - name: external
              namespace: gateway
          labels:
            cluster.routine.sh/oidc-credentials: alertmanager-oidc-credentials

    grafana:
      enabled: false
      forceDeployDashboards: true

    prometheus:
      enabled: true
      route:
        main:
          enabled: true
          hostnames: [ "prometheus.${CLUSTER_DOMAIN}" ]
          parentRefs:
            - name: external
              namespace: gateway
          labels:
            cluster.routine.sh/oidc-credentials: prometheus-oidc-credentials
      prometheusSpec:
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            metadata:
              # Prometheus TSDB is large and transient — never back up the
              # volume data. This label tells Velero to skip the PVC entirely
              # (the StatefulSet recreates it on restore).
              labels:
                velero.io/exclude-from-backup: "true"
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 16Gi

    # monitoring sources
    coreDns:
      enabled: true
    kubeDns:
      enabled: false
    kubeEtcd:
      enabled: true
    kubeProxy:
      enabled: true
    kubeStateMetrics:
      enabled: true
      # Override liveness probe to /healthz.
      #
      # The chart default is /livez, which returns 503 when kube-state-metrics
      # briefly loses contact with the kube-apiserver (logged as
      # "Failed to contact API server for /livez: got 0" in the container).
      # These blips do not affect metrics scraping or the pod's ability to
      # serve /metrics, but they generate noisy 503 events (836 over 13 days
      # in the June 2026 run). /healthz is the documented process-alive
      # endpoint and only fails if the HTTP server itself is wedged, which
      # is the actual condition we want the kubelet to restart on.
      livenessProbe:
        httpGet:
          path: /healthz
          port: http
    kubernetesServiceMonitors:
      enabled: true
    kubeApiServer:
      enabled: true
    kubelet:
      enabled: true
    nodeExporter:
      enabled: true
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    windowsMonitoring:
      enabled: false

    defaultRules:
      create: true
    # customRules:

---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/secret.json
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: alertmanager-oidc-credentials
stringData:
  client-id: ${OIDC_ALERTMANAGER_CLIENT_ID}
  client-secret: ${OIDC_ALERTMANAGER_CLIENT_SECRET}
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/secret.json
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: prometheus-oidc-credentials
stringData:
  client-id: ${OIDC_PROMETHEUS_CLIENT_ID}
  client-secret: ${OIDC_PROMETHEUS_CLIENT_SECRET}
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  interval: 1h

  # Patch the rendered Deployment for kube-state-metrics to use /healthz
  # for the liveness probe instead of the chart-default /livez. See the
  # `kubeStateMetrics:` block below for the full root-cause writeup; the
  # short version is that the kube-state-metrics subchart hardcodes the
  # liveness probe path as a string literal, so values-level overrides
  # of livenessProbe.httpGet.path are silently ignored. A kustomize
  # strategic-merge patch on the post-rendered manifest is the only
  # way to change it without forking the chart.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: kube-prometheus-stack-kube-state-metrics
            patch: |
              - op: replace
                path: /spec/template/spec/containers/0/livenessProbe/httpGet/path
                value: /healthz

  values:
    cleanPrometheusOperatorObjectNames: true

    crds:
      enabled: true
      upgradeJob:
        enabled: true

    global:
      rbac:
        create: true

    alertmanager:
      enabled: true
      alertmanagerSpec:
        externalURL: "https://alertmanager.${CLUSTER_DOMAIN}"
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi
      route:
        main:
          enabled: true
          hostnames: [ "alertmanager.${CLUSTER_DOMAIN}" ]
          parentRefs:
            - name: external
              namespace: gateway
          labels:
            cluster.routine.sh/oidc-credentials: alertmanager-oidc-credentials

    grafana:
      enabled: false
      forceDeployDashboards: true

    prometheus:
      enabled: true
      route:
        main:
          enabled: true
          hostnames: [ "prometheus.${CLUSTER_DOMAIN}" ]
          parentRefs:
            - name: external
              namespace: gateway
          labels:
            cluster.routine.sh/oidc-credentials: prometheus-oidc-credentials
      prometheusSpec:
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        # Cap TSDB size so Prometheus self-manages retention; the PVC is
        # sized with ~15% headroom above this to absorb WAL overhead and
        # compaction spikes without hitting ENOSPC.
        retentionSize: 55GiB
        storageSpec:
          volumeClaimTemplate:
            metadata:
              # Prometheus TSDB is large and transient — never back up the
              # volume data. This label tells Velero to skip the PVC entirely
              # (the StatefulSet recreates it on restore).
              labels:
                velero.io/exclude-from-backup: "true"
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 64Gi

    # monitoring sources
    coreDns:
      enabled: true
    kubeDns:
      enabled: false
    # kubeEtcd.enabled=true deploys a chart-default ServiceMonitor that
    # selects `app.kubernetes.io/name: kube-etcd`, but the chart's
    # auto-created Service has no matching pods in k0s (k0s runs etcd
    # as part of the k0s controller process, listening on each
    # controller's local interface — not as a Pod, and not exposed as
    # a normal in-cluster Service). The default ServiceMonitor
    # therefore has 0 targets and exposes no etcd server-side metrics.
    #
    # What we *do* have, today, is client-side etcd request duration:
    # the apiserver exposes its own client-go etcd client metrics on
    # its /metrics endpoint, which is scraped by the
    # `kubeApiServer.enabled: true` job below (job label: `apiserver`).
    # That's how queries like
    # `apiserver_request_total{...resource="leases"...}` get their
    # data, and it's the dataset the kube-apiserver-errors PrometheusRule
    # in `platform/monitoring/monitors/kube-apiserver.yaml` alerts on.
    #
    # To get etcd *server-side* metrics (etcd_disk_wal_fsync_duration_seconds,
    # etcd_server_leader_changes_seen_total, etcd_server_is_leader,
    # etcd_mvcc_db_total_size_in_bytes, etc.) a k0s-specific config
    # is needed:
    #   1. A headless Service + Endpoints pointing at the k0s
    #      controller nodes' etcd listener (10.72.13.11/12/13:2379).
    #   2. A custom ServiceMonitor that scrapes those endpoints with
    #      TLS to the k0s-generated etcd CA (read from
    #      /var/lib/k0s/etcd/ca.crt on a controller and seeded into
    #      a Secret).
    #   3. Disable the chart's default ServiceMonitor
    #      (`kubeEtcd.serviceMonitor.enabled: false`) so it doesn't
    #      fight the new one.
    # Tracked as a follow-up; the kube-apiserver-errors rule covers
    # the user-visible signal in the meantime.
    kubeEtcd:
      enabled: true
    kubeProxy:
      enabled: true
    kubeStateMetrics:
      enabled: true
      # NOTE: do NOT try to override livenessProbe.httpGet.path here. The
      # kube-state-metrics subchart (v7.4.0, shipped with kube-prometheus-stack
      # 86.2.2) hardcodes the liveness probe path as a string literal in
      # `charts/kube-state-metrics/templates/deployment.yaml`:
      #
      #   livenessProbe:
      #     httpGet:
      #       ...
      #       path: /livez          # ← not a template expression, not overridable
      #       port: http
      #       ...
      #
      # Only `failureThreshold`, `httpGet.scheme`, `httpGet.httpHeaders`,
      # `initialDelaySeconds`, `periodSeconds`, `successThreshold`, and
      # `timeoutSeconds` are read from .Values.livenessProbe. A values-level
      # `livenessProbe: { httpGet: { path: /healthz } }` is silently ignored.
      #
      # The actual fix is a Flux `postRenderers` kustomize patch (see
      # `spec.postRenderers` above) that replaces the path in the rendered
      # Deployment manifest. PR #3339 added the values-level override on
      # 2026-06-12; the rendered Deployment was never actually changed, the
      # pod was never rolled, and the noise continued.
      #
      # Root cause of the underlying problem: kube-state-metrics's `/livez`
      # handler calls `cli.HealthzCheck()` on its in-cluster apiserver client
      # and returns 503 if the apiserver's own `/livez` blips. The k0s
      # kube-apiserver in this cluster returns empty responses (~got 0~)
      # intermittently (visible in the pod's container log as
      # ~Failed to contact API server for /livez: got 0~). These blips do
      # not affect `/metrics` scraping or the pod's actual health, but
      # produce one `Unhealthy: Liveness probe failed: HTTP probe failed
      # with statuscode: 503` event per blip, which the k8s-health cron
      # surfaces as a WARN. The proper fix is to point KSM's liveness
      # probe at `/healthz` (the documented process-alive endpoint that
      # only fails if the HTTP server itself is wedged) — which is what
      # the postRender patch above does.
    kubernetesServiceMonitors:
      enabled: true
    kubeApiServer:
      enabled: true
    kubelet:
      enabled: true
    nodeExporter:
      enabled: true
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    windowsMonitoring:
      enabled: false

    defaultRules:
      create: true
    # customRules:
